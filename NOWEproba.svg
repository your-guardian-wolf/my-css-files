<svg width="100%" height="670" viewBox="0 0 1500 670"
     xmlns="http://www.w3.org/2000/svg">

  <defs>
    <mask id="cut">
      <!-- wszystko widoczne -->
      <rect x="0" y="0" width="1500" height="670" fill="white"/>

      <!-- WYCIĘCIE: zawsze 500px -->
      <path d="
        M 0 300
        H 500
        Q 515 300 515 315
        V 655
        Q 515 670 500 670
        H 0
        Z"
        fill="black"/>
    </mask>
  </defs>

  <!-- główny kształt -->
  <rect width="100%" height="100%" fill="black" mask="url(#cut)"
        stroke="red" stroke-width="3"/>

</svg>

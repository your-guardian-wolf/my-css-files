<svg xmlns="http://www.w3.org/2000/svg" 
     viewBox="0 0 600 200" 
     preserveAspectRatio="xMaxYMax slice" 
     style="width: 100%; height: 200px; display: block;">
  
  <rect width="100%" height="100%" fill="white"/>
  
  <g transform="translate(180, 165)">
     <rect x="20" y="0" width="420" height="35" 
          rx="25"
           fill="none" 
           stroke="red" 
           stroke-width="6"/>
     
     <rect x="50" y="0" width="100" height="35" fill="black"/>
     
     <circle cx="50" cy="35" r="35" fill="black"/>
  </g>
</svg>
<svg viewBox="0 0 600 200" 
       style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none;">
    <g transform="translate(180, 165)">
      <!-- Czerwony border obejmujący całe wycięcie (prostokąt + koło) -->
      <path d="
        M20,0                <!-- start lewy górny róg prostokąta -->
        H440                  <!-- górna krawędź prostokąta -->
        M20,0                 <!-- powrót do lewego górnego rogu -->
        L20,35                <!-- lewa krawędź prostokąta -->
        Q20,70 55,70          <!-- łuk do koła (lewa strona) -->
        " fill="none" stroke="red" stroke-width="4"/>
    </g>
  </svg>

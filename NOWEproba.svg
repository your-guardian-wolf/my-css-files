<svg viewBox="0 0 1300 670" width="100%" height="670" preserveAspectRatio="none" style="max-width:1300px; display:block;" > <defs> <!-- MASKA: biały = widoczne, czarny = wycięte --> <mask id="shapeMask"> <!-- całość widoczna --> <rect width="1300" height="670" fill="white"/> <!-- wycięcie --> <rect x="0" y="var(--topBar, 200)" width="470" height="470" fill="black" /> </mask> </defs> <!-- KSZTAŁT --> <rect width="1300" height="670" rx="15" ry="15" fill="black" mask="url(#shapeMask)" /> </svg>
